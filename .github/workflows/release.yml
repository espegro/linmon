name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish/update the GitHub release after building artifacts"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-ubuntu:
    name: Build on Ubuntu 24.04
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            libbpf-dev \
            linux-tools-generic \
            libssl-dev \
            libcap-dev \
            zlib1g-dev

      - name: Build
        run: |
          echo "Using pre-generated vmlinux.h from repository"
          make clean && make

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/linmond dist/
          cp linmond.service dist/
          cp linmond.logrotate dist/
          cp linmon.conf.example dist/
          cp README.md dist/
          cd dist
          tar -czf ../linmond-ubuntu-24.04-amd64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linmond-ubuntu-24.04-amd64
          path: linmond-ubuntu-24.04-amd64.tar.gz

  build-ubuntu-2604:
    name: Build on Ubuntu 26.04
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04

    steps:
      - name: Install Git and dependencies
        run: |
          apt-get update
          apt-get install -y git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            libbpf-dev \
            linux-tools-generic \
            libssl-dev \
            libcap-dev \
            zlib1g-dev

      - name: Build
        run: |
          echo "Using pre-generated vmlinux.h from repository"
          make clean && make

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/linmond dist/
          cp linmond.service dist/
          cp linmond.logrotate dist/
          cp linmon.conf.example dist/
          cp README.md dist/
          cd dist
          tar -czf ../linmond-ubuntu-26.04-amd64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linmond-ubuntu-26.04-amd64
          path: linmond-ubuntu-26.04-amd64.tar.gz

  build-rhel9:
    name: Build on RHEL 9 (Rocky Linux)
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    steps:
      - name: Install Git
        run: |
          dnf install -y git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable CRB repository
        run: |
          dnf install -y dnf-plugins-core
          dnf config-manager --set-enabled crb

      - name: Install dependencies
        run: |
          dnf install -y \
            clang \
            llvm \
            elfutils-libelf-devel \
            libbpf-devel \
            bpftool \
            openssl-devel \
            libcap-devel \
            zlib-devel \
            make \
            kernel-devel

      - name: Build
        run: |
          echo "Using pre-generated vmlinux.h from repository"
          make clean && make

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/linmond dist/
          cp linmond.service dist/
          cp linmond.logrotate dist/
          cp linmon.conf.example dist/
          cp README.md dist/
          cd dist
          tar -czf ../linmond-rhel9-x86_64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linmond-rhel9-x86_64
          path: linmond-rhel9-x86_64.tar.gz

  build-rhel10:
    name: Build on RHEL 10 (Rocky Linux)
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:10-ubi

    steps:
      - name: Install Git
        run: |
          dnf install -y git

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable CRB repository
        run: |
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager --set-enabled crb

      - name: Install dependencies
        run: |
          dnf install -y \
            clang \
            llvm \
            elfutils-libelf-devel \
            libbpf-devel \
            bpftool \
            openssl-devel \
            libcap-devel \
            zlib-devel \
            make \
            kernel-devel

      - name: Build
        run: |
          echo "Using pre-generated vmlinux.h from repository"
          make clean && make

      - name: Package binary
        run: |
          mkdir -p dist
          cp build/linmond dist/
          cp linmond.service dist/
          cp linmond.logrotate dist/
          cp linmon.conf.example dist/
          cp README.md dist/
          cd dist
          tar -czf ../linmond-rhel10-x86_64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linmond-rhel10-x86_64
          path: linmond-rhel10-x86_64.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build-ubuntu, build-ubuntu-2604, build-rhel9, build-rhel10]
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_release == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Ubuntu 24.04 artifact
        uses: actions/download-artifact@v4
        with:
          name: linmond-ubuntu-24.04-amd64

      - name: Download Ubuntu 26.04 artifact
        uses: actions/download-artifact@v4
        with:
          name: linmond-ubuntu-26.04-amd64

      - name: Download RHEL 9 artifact
        uses: actions/download-artifact@v4
        with:
          name: linmond-rhel9-x86_64

      - name: Download RHEL 10 artifact
        uses: actions/download-artifact@v4
        with:
          name: linmond-rhel10-x86_64

      - name: Read VERSION file
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Generate release notes from changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="release-notes.md"

          {
            echo "# LinMon v${VERSION}"
            echo
            awk -v version="$VERSION" '
              $0 ~ "^## \\[" version "\\]" { in_section = 1; next }
              in_section && /^## \[/ { exit }
              in_section { print }
            ' CHANGELOG.md
            echo
            echo "## Downloads"
            echo
            echo "- \`linmond-ubuntu-24.04-amd64.tar.gz\`"
            echo "- \`linmond-ubuntu-26.04-amd64.tar.gz\`"
            echo "- \`linmond-rhel9-x86_64.tar.gz\`"
            echo "- \`linmond-rhel10-x86_64.tar.gz\`"
          } > "$NOTES_FILE"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: LinMon v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            linmond-ubuntu-24.04-amd64.tar.gz
            linmond-ubuntu-26.04-amd64.tar.gz
            linmond-rhel9-x86_64.tar.gz
            linmond-rhel10-x86_64.tar.gz
          draft: false
          prerelease: false
